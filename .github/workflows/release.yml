name: Release

# Publishes every artifact on a version tag.
# Flow: bump the version in each package file (sdk-js/package.json,
# npm-package/package.json, sdk-python/pyproject.toml) → commit →
# `git tag vX.Y.Z && git push origin main --tags`.
#
# Auth is tokenless via OIDC "trusted publishing" — configure once:
#   • npm:  Settings → Trusted Publisher on BOTH `deployzy` and `deployzy-sdk`
#           (GitHub Actions · repo jams24/deployzy · workflow release.yml)
#   • PyPI: project `deployzy` → Publishing → add GitHub publisher
#           (owner jams24 · repo deployzy · workflow release.yml)

on:
  push:
    tags:
      - "v*"

jobs:
  # 1) Cross-compile the CLI + server binaries and cut the GitHub release.
  #    The CLI wrapper's postinstall downloads deployzy_<os>_<arch> from here.
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2) JS SDK → npm  (tokenless OIDC + provenance)
  npm-sdk:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - name: Build & publish
        working-directory: sdk-js
        run: |
          npm install
          npm run build
          npm publish

  # 3) CLI wrapper → npm. Needs the release first so postinstall can fetch binaries.
  npm-cli:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - name: Publish
        working-directory: npm-package
        run: npm publish

  # 4) Python SDK → PyPI  (tokenless OIDC trusted publishing)
  pypi:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk-python/dist
