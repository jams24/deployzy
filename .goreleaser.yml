version: 2

project_name: deployzy

before:
  hooks:
    - go mod tidy -C server
    - go mod tidy -C cli

builds:
  - id: servermesrv
    main: ./cmd/servermesrv
    dir: server
    binary: servermesrv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: deployzy
    main: ./cmd/deployzy
    dir: cli
    binary: deployzy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: server
    builds:
      - servermesrv
    name_template: "servermesrv_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

  - id: cli
    builds:
      - deployzy
    name_template: "deployzy_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: jams24
    name: deployzy
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
