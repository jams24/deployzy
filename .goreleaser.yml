version: 2

project_name: deployzy

before:
  hooks:
    - go mod tidy -C server
    - go mod tidy -C cli

builds:
  - id: servermesrv
    main: ./cmd/servermesrv
    dir: server
    binary: servermesrv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/serverme/serverme/proto.Version={{ .Version }}

  - id: deployzy
    main: ./cmd/deployzy
    dir: cli
    binary: deployzy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/serverme/serverme/proto.Version={{ .Version }}

archives:
  - id: server
    builds:
      - servermesrv
    name_template: "servermesrv_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

  - id: cli
    builds:
      - deployzy
    name_template: "deployzy_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

# Auto-update the Homebrew tap formula on each release (CLI only).
# Needs a HOMEBREW_TAP_TOKEN secret with write access to jams24/homebrew-deployzy.
brews:
  - name: deployzy
    ids:
      - cli
    repository:
      owner: jams24
      name: homebrew-deployzy
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://deployzy.com"
    description: "Open-source, free platform to deploy apps, expose localhost (tunnels) & run databases"
    license: "MIT"
    install: |
      bin.install "deployzy"
    test: |
      system "#{bin}/deployzy", "version"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: jams24
    name: deployzy
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
