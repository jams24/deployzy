<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark Background -->
  <rect width="64" height="64" rx="14" fill="#0D1117"/>

  <!-- Left Bracket (Cyan) -->
  <path d="M 22 12 H 18 A 4 4 0 0 0 14 16 V 28 A 4 4 0 0 1 10 32 A 4 4 0 0 1 14 36 V 48 A 4 4 0 0 0 18 52 H 22" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right Bracket (Emerald Green) -->
  <path d="M 42 12 H 46 A 4 4 0 0 1 50 16 V 28 A 4 4 0 0 0 54 32 A 4 4 0 0 0 50 36 V 48 A 4 4 0 0 1 46 52 H 42" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Rocket (Cyan body, Green/Teal details & flames) rotated 45 degrees -->
  <g transform="translate(32, 32) rotate(45) translate(-32, -32)">
    <!-- Flame trails -->
    <path d="M 29 37 Q 26 44 24 50" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 32 37 V 53" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 35 37 Q 38 44 40 50" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Left & Right Fins -->
    <path d="M 27 26 L 19 32 V 36 H 27" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#0D1117"/>
    <path d="M 37 26 L 45 32 V 36 H 37" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#0D1117"/>

    <!-- Rocket Body -->
    <path d="M 32 10 Q 38 20 37 36 H 27 Q 26 20 32 10 Z" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="#0D1117"/>

    <!-- Center Line -->
    <path d="M 32 12 V 36" stroke="#22D3EE" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
