<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{{.Title}} — Deployzy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0a0a0a;color:#e5e7eb;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
  }
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:48px;text-decoration:none}
  .logo svg{width:32px;height:32px}
  .logo-text{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px}
  .big-num{
    font-size:clamp(120px,20vw,200px);font-weight:900;line-height:1;
    color:transparent;
    background:linear-gradient(180deg,#2a2a2a 0%,#141414 100%);
    -webkit-background-clip:text;background-clip:text;
    user-select:none;pointer-events:none;
    position:absolute;z-index:0;
  }
  .content{position:relative;z-index:1;text-align:center;max-width:480px}
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    background:#1a1a1a;border:1px solid #2a2a2a;border-radius:999px;
    padding:6px 14px;font-size:13px;color:#9ca3af;margin-bottom:24px;
  }
  .badge-dot{width:6px;height:6px;border-radius:50%;background:{{.DotColor}}}
  h1{font-size:22px;font-weight:600;color:#f9fafb;margin-bottom:8px}
  p{font-size:15px;color:#6b7280;line-height:1.6;margin-bottom:24px}
  .meta{
    background:#111;border:1px solid #1f1f1f;border-radius:8px;
    padding:12px 16px;margin-bottom:28px;text-align:left;
  }
  .meta-row{display:flex;gap:8px;font-size:12px;font-family:monospace;color:#4b5563;line-height:1.8}
  .meta-key{color:#374151;min-width:60px}
  .cta{
    display:inline-flex;align-items:center;gap:8px;
    background:#fff;color:#000;
    font-size:14px;font-weight:500;
    padding:10px 20px;border-radius:8px;text-decoration:none;
    transition:opacity .15s;
  }
  .cta:hover{opacity:.85}
  .cta-ghost{
    display:inline-flex;align-items:center;gap:8px;margin-left:8px;
    background:transparent;color:#6b7280;border:1px solid #2a2a2a;
    font-size:14px;font-weight:500;
    padding:10px 20px;border-radius:8px;text-decoration:none;
    transition:color .15s,border-color .15s;
  }
  .cta-ghost:hover{color:#d1d5db;border-color:#4b5563}
</style>
</head>
<body>
<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;pointer-events:none">
  <span class="big-num">{{.Code}}</span>
</div>

<a href="https://deployzy.com" class="logo">
  <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="32" height="32" rx="8" fill="#18181b"/>
    <path d="M16 6C10.477 6 6 10.477 6 16s4.477 10 10 10 10-4.477 10-10S21.523 6 16 6zm-1 14.5v-9l7 4.5-7 4.5z" fill="#fff"/>
  </svg>
  <span class="logo-text">Deployzy</span>
</a>

<div class="content">
  <div class="badge">
    <span class="badge-dot"></span>
    {{.BadgeText}}
  </div>
  <h1>{{.Heading}}</h1>
  <p>{{.Body}}</p>

  <div class="meta">
    <div class="meta-row"><span class="meta-key">Host</span><span>{{.Host}}</span></div>
    <div class="meta-row"><span class="meta-key">Reason</span><span>{{.Reason}}</span></div>
  </div>

  <a href="https://deployzy.com" class="cta">Visit Deployzy</a>
  {{if .DashURL}}<a href="{{.DashURL}}" class="cta-ghost">Go to dashboard →</a>{{end}}
</div>
</body>
</html>
