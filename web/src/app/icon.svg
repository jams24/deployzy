<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- ServerMe icon mark — server rack with deploy arrow -->

  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#0D1117"/>

  <!-- Server bars (two stacked = infrastructure) -->
  <rect x="14" y="32" width="36" height="9" rx="3" fill="#10B981"/>
  <rect x="14" y="20" width="36" height="9" rx="3" fill="#34D399"/>

  <!-- LED status dots on each bar -->
  <circle cx="21" cy="24.5" r="1.8" fill="#064E3B"/>
  <circle cx="27" cy="24.5" r="1.8" fill="#064E3B"/>
  <circle cx="21" cy="36.5" r="1.8" fill="#064E3B"/>
  <circle cx="27" cy="36.5" r="1.8" fill="#064E3B"/>

  <!-- Deploy arrow (rocket-launch upward) -->
  <path d="M32 18 L32 8" stroke="#6EE7B7" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M27 13 L32 8 L37 13" stroke="#6EE7B7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tunnel connection pulse (right side) -->
  <path d="M50 24.5 Q56 24.5 56 30 L56 36.5 Q56 42 50 42" stroke="#6EE7B7" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <circle cx="56" cy="33" r="2" fill="#6EE7B7" opacity="0.7"/>

  <!-- Database indicator (bottom) -->
  <ellipse cx="32" cy="48" rx="12" ry="3.5" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
  <path d="M20 48 L20 52 Q20 55 32 55 Q44 55 44 52 L44 48" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
</svg>
